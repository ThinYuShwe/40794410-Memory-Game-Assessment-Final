<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="gamepage-body">
    <video
      class="game-bg-video"
      autoplay
      muted
      loop
      playsinline
      aria-hidden="true"
    >
      <source src="assets/game/gameBg4.mp4" type="video/mp4" />
    </video>
    <header class="page-header">
      <a href="index.html" class="logo-container" aria-label="Home">
        <img src="assets/header/logo2.png" alt="logo" class="logo" />
      </a>
      <nav class="nav-links">
        <a href="signup.html">SIGN UP</a>
        <a href="login.html">LOGIN</a>
      </nav>
    </header>

    <main class="game-page">
      <div class="game-header">
        <h1>MEMORY</h1>
        <div class="buttons">
          <button
            type="button"
            class="btn btn-sound"
            id="btn-sound"
            title="Toggle sound effects"
            aria-label="Toggle sound effects"
          >
            <img
              src="assets/game/soundEffects.png"
              alt="Sound"
              class="sound-icon"
            />
          </button>
          <button type="button" class="btn" id="btn-restart">RESTART</button>
          <a href="gamesetup.html" class="btn" style="text-decoration: none"
            >NEW GAME</a
          >
        </div>
      </div>

      <div class="players-bar" id="players-bar"></div>

      <div class="grid-wrap">
        <div class="memory-grid" id="memory-grid"></div>
      </div>

      <div class="stats-bar">
        <span id="stat-time">TIME: 0:00</span>
        <span id="stat-moves">MOVE: 0</span>
      </div>
    </main>

    <div class="modal-overlay hidden" id="win-modal">
      <div class="modal">
        <h2 id="win-title">YOU WIN!</h2>
        <p class="winner-text" id="win-winner"></p>
        <p class="stats" id="win-stats"></p>
        <div>
          <button type="button" class="btn" id="btn-play-again">
            PLAY AGAIN
          </button>
          <a href="gamesetup.html" class="btn" style="text-decoration: none"
            >NEW GAME</a
          >
        </div>
      </div>
    </div>

    <footer class="page-footer">
      <div class="user-profile-wrap hidden" id="user-profile-wrap">
        <button
          type="button"
          class="user-profile-btn"
          id="user-profile-btn"
          aria-label="View profile"
        >
          <img src="assets/footer/user.png" alt="Profile" />
        </button>
      </div>
      <div class="music-wrap">
        <img
          src="./assets/game/music.png"
          alt="Music Toggle"
          class="music-icon"
        />
      </div>
    </footer>

    <div class="modal-overlay profile-modal hidden" id="profile-modal">
      <div class="modal">
        <h2>PROFILE</h2>
        <img
          src=""
          alt="Your profile"
          class="profile-avatar"
          id="profile-avatar"
        />
        <p class="profile-username" id="profile-username"></p>
        <p class="profile-email" id="profile-email"></p>
        <button type="button" class="btn" id="profile-close">CLOSE</button>
      </div>
    </div>
    <div class="modal-overlay music-modal hidden" id="music-modal">
      <div class="modal music-player-card">
        <button class="music-close" id="music-close">×</button>

        <h2 class="music-player-header">Music Player</h2>

        <div id="playlist"></div>

        <audio id="bgm-audio" loop></audio>
      </div>
    </div>

    <script src="js/game.js"></script>

    <script>
      (function () {
        var cu = localStorage.getItem("currentUser");
        var wrap = document.getElementById("user-profile-wrap");
        if (!cu || !wrap) return;
        var user = JSON.parse(cu);
        var avatarSrc = user.avatar || "assets/signup/c1.png";
        wrap.classList.remove("hidden");
        wrap.querySelector(".user-profile-btn img").src = avatarSrc;
        wrap.querySelector(".user-profile-btn img").alt = "Your profile";
        var btn = document.getElementById("user-profile-btn");
        var modal = document.getElementById("profile-modal");
        var closeBtn = document.getElementById("profile-close");
        btn.addEventListener("click", function () {
          document.getElementById("profile-avatar").src = avatarSrc;
          document.getElementById("profile-username").textContent =
            "NAME: " + (user.username || "");
          document.getElementById("profile-email").textContent =
            "EMAIL: " + (user.email || "");
          modal.classList.remove("hidden");
        });
        closeBtn.addEventListener("click", function () {
          modal.classList.add("hidden");
        });
        modal.addEventListener("click", function (e) {
          if (e.target === modal) modal.classList.add("hidden");
        });
      })();
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const musicIcon = document.querySelector(".music-wrap");
        const musicModal = document.getElementById("music-modal");
        const musicClose = document.getElementById("music-close");
        const audio = document.getElementById("bgm-audio");
        const playlistContainer = document.getElementById("playlist");

        let songs = [];
        let currentSongIndex = -1;

        // Open / Close modal
        musicIcon.addEventListener("click", () =>
          musicModal.classList.remove("hidden"),
        );
        musicClose.addEventListener("click", () =>
          musicModal.classList.add("hidden"),
        );

        // Load playlist from JSON
        fetch("assets/playlist.json")
          .then((res) => res.json())
          .then((data) => {
            songs = data;
            renderPlaylist();
          })
          .catch((err) => console.error("JSON Error:", err));

        // Play a song by index
        function playSong(index) {
          const song = songs[index];
          if (!song) return;

          audio.src = song.file;
          audio.play();
          currentSongIndex = index;
          updatePlaylistUI();
        }

        function renderPlaylist() {
          playlistContainer.innerHTML = "";

          songs.forEach((song, index) => {
            const item = document.createElement("div");
            item.classList.add("song-item");

            item.innerHTML = `
            <div class="art-stack small">
              <div class="vinyl-record"></div>
              <div class="player-wrapper">
                <img src="${song.cover}" class="player-avatar song-avatar"/>
                <button class="mini-play-btn">▶</button>
              </div>
            </div>

            <div class="music-control">
              <p class="track-name">${song.title}</p>
              <div class="waveform"></div>
            </div>
    `;

            const waveform = item.querySelector(".waveform");

            // create bars
            for (let i = 0; i < 55; i++) {
              const bar = document.createElement("span");
              waveform.appendChild(bar);
            }

            const img = item.querySelector(".song-avatar");
            const miniPlayBtn = item.querySelector(".mini-play-btn");

            function handlePlay() {
              if (currentSongIndex === index && !audio.paused) {
                audio.pause();
              } else {
                playSong(index);
              }
            }

            img.addEventListener("click", handlePlay);
            miniPlayBtn.addEventListener("click", handlePlay);

            // hover effect
            miniPlayBtn.addEventListener("mouseenter", () => {
              img.style.opacity = "0.5";
            });

            miniPlayBtn.addEventListener("mouseleave", () => {
              img.style.opacity = "1";
            });

            playlistContainer.appendChild(item);
          });
        }
        audio.addEventListener("play", () => {
          document.querySelector(".waveform").classList.add("active");
        });

        audio.addEventListener("pause", () => {
          document.querySelector(".waveform").classList.remove("active");
        });

        function updatePlaylistUI() {
          const items = playlistContainer.querySelectorAll(".song-item");

          items.forEach((item, index) => {
            const miniBtn = item.querySelector(".mini-play-btn");
            const waveform = item.querySelector(".waveform"); // Target the specific waveform in this row

            const isCurrentPlaying =
              index === currentSongIndex && !audio.paused;

            // Toggle Play/Pause icon
            miniBtn.textContent = isCurrentPlaying ? "⏸" : "▶";

            // Toggle Waveform animation for THIS song only
            if (isCurrentPlaying) {
              item.classList.add("active");
              waveform.classList.add("active");
            } else {
              item.classList.remove("active");
              waveform.classList.remove("active");
            }
          });
        }

        // Update UI whenever audio plays/pauses
        audio.addEventListener("play", updatePlaylistUI);
        audio.addEventListener("pause", updatePlaylistUI);
      });
    </script>
  </body>
</html>
