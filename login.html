<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Game - Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="login-body">
    <video
      class="login-bg-video"
      autoplay
      muted
      loop
      playsinline
      aria-hidden="true"
    >
      <source src="assets/login/loginBg2.mp4" type="video/mp4" />
    </video>

    <header class="page-header">
      <a href="index.html" class="logo-container" aria-label="Home">
        <img src="assets/header/logo2.png" alt="logo" class="logo" />
      </a>
      <nav class="nav-links">
        <a href="signup.html">SIGN UP</a>
        <a href="login.html">LOGIN</a>
      </nav>
    </header>

    <main class="form-page">
      <div class="form-card">
        <h1>LOG IN</h1>

        <form id="signin-form" action="#" method="get" novalidate>
          <div class="form-group">
            <label for="username">USERNAME</label>
            <input
              type="text"
              id="username"
              name="username"
              autocomplete="username"
            />
            <span class="field-error" id="login-error" role="alert"></span>
          </div>
          <div class="form-group">
            <label for="password">PASSWORD</label>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
            />
          </div>
          <button type="submit" class="btn">LOGIN</button>
          <a href="#" class="forgot-link" aria-disabled="true"
            >FORGET PASSWORD?</a
          >
        </form>
      </div>
    </main>

    <script>
      document
        .getElementById("signin-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          var username = (document.getElementById("username").value || "").trim();
          var password = document.getElementById("password").value || "";
          var errorEl = document.getElementById("login-error");
          errorEl.textContent = "";
          if (!username) {
            errorEl.textContent = "Please enter your username.";
            return;
          }
          if (!password) {
            errorEl.textContent = "Please enter your password.";
            return;
          }
          var stored = localStorage.getItem("memoryGameUsers");
          var users = stored ? JSON.parse(stored) : [];
          var user = users.find(function (u) {
            return u.username.toLowerCase() === username.toLowerCase() && u.password === password;
          });
          if (!user) {
            errorEl.textContent = "Invalid username or password.";
            return;
          }
          localStorage.setItem("currentUser", JSON.stringify({
            username: user.username,
            email: user.email,
            avatar: user.avatar || "assets/signup/c1.png"
          }));
          window.location.href = "gamesetup.html";
        });
    </script>
  </body>
</html>
