<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="gamepage-body">
    <video
      class="game-bg-video"
      autoplay
      muted
      loop
      playsinline
      aria-hidden="true"
    >
      <source src="assets/game/gameBg4.mp4" type="video/mp4" />
    </video>
    <header class="page-header">
      <a href="index.html" class="logo-container" aria-label="Home">
        <img src="assets/header/logo2.png" alt="logo" class="logo" />
      </a>
      <nav class="nav-links">
        <a href="signup.html">SIGN UP</a>
        <a href="login.html">LOGIN</a>
      </nav>
    </header>

    <main class="game-page">
      <div class="game-header">
        <h1>MEMORY</h1>
        <div class="buttons">
          <button
            type="button"
            class="btn btn-sound"
            id="btn-sound"
            title="Toggle sound effects"
            aria-label="Toggle sound effects"
          >
            <img
              src="assets/game/soundEffects.png"
              alt="Sound"
              class="sound-icon"
            />
          </button>
          <button type="button" class="btn" id="btn-restart">RESTART</button>
          <a href="gamesetup.html" class="btn" style="text-decoration: none"
            >NEW GAME</a
          >
        </div>
      </div>

      <div class="players-bar" id="players-bar"></div>

      <div class="grid-wrap">
        <div class="memory-grid" id="memory-grid"></div>
      </div>

      <div class="stats-bar">
        <span id="stat-time">TIME: 0:00</span>
        <span id="stat-moves">MOVE: 0</span>
      </div>
    </main>

    <div class="modal-overlay hidden" id="win-modal">
      <div class="modal">
        <h2 id="win-title">YOU WIN!</h2>
        <p class="winner-text" id="win-winner"></p>
        <p class="stats" id="win-stats"></p>
        <div>
          <button type="button" class="btn" id="btn-play-again">
            PLAY AGAIN
          </button>
          <a href="gamesetup.html" class="btn" style="text-decoration: none"
            >NEW GAME</a
          >
        </div>
      </div>
    </div>

    <footer class="page-footer">
      <div class="user-profile-wrap hidden" id="user-profile-wrap">
        <button
          type="button"
          class="user-profile-btn"
          id="user-profile-btn"
          aria-label="View profile"
        >
          <img src="assets/footer/user.png" alt="Profile" />
        </button>
      </div>
      <div class="music-wrap">
        <img
          src="./assets/game/music.png"
          alt="Music Toggle"
          class="music-icon"
        />
      </div>
    </footer>

    <div class="modal-overlay profile-modal hidden" id="profile-modal">
      <div class="modal">
        <h2>PROFILE</h2>
        <img
          src=""
          alt="Your profile"
          class="profile-avatar"
          id="profile-avatar"
        />
        <p class="profile-username" id="profile-username"></p>
        <p class="profile-email" id="profile-email"></p>
        <button type="button" class="btn" id="profile-close">CLOSE</button>
      </div>
    </div>

    <div class="modal-overlay music-modal hidden" id="music-modal">
      <div class="modal music-player-card">
        <button class="music-close" id="music-close">×</button>

        <h2>BGM PLAYER</h2>

        <div class="player-content">
          <img
            src="./assets/game/music.png"
            alt="Album Art"
            class="player-avatar rotating"
          />

          <div class="track-info">
            <p class="track-name">Ancient Ruins Theme</p>
            <p class="track-status" id="track-status">PAUSED</p>
          </div>

          <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
          </div>

          <div class="player-controls">
            <button type="button" class="ctrl-btn" id="btn-prev">«</button>
            <button type="button" class="play-pause-btn" id="btn-play-pause">
              ▶
            </button>
            <button type="button" class="ctrl-btn" id="btn-next">»</button>
          </div>
        </div>

        <audio id="bgm-audio" loop>
          <source src="assets/game/musics/music1.mp3" type="audio/mpeg" />
        </audio>
      </div>
    </div>

    <script src="js/game.js"></script>
    <script>
      (function () {
        var cu = localStorage.getItem("currentUser");
        var wrap = document.getElementById("user-profile-wrap");
        if (!cu || !wrap) return;
        var user = JSON.parse(cu);
        var avatarSrc = user.avatar || "assets/signup/c1.png";
        wrap.classList.remove("hidden");
        wrap.querySelector(".user-profile-btn img").src = avatarSrc;
        wrap.querySelector(".user-profile-btn img").alt = "Your profile";
        var btn = document.getElementById("user-profile-btn");
        var modal = document.getElementById("profile-modal");
        var closeBtn = document.getElementById("profile-close");
        btn.addEventListener("click", function () {
          document.getElementById("profile-avatar").src = avatarSrc;
          document.getElementById("profile-username").textContent =
            "NAME: " + (user.username || "");
          document.getElementById("profile-email").textContent =
            "EMAIL: " + (user.email || "");
          modal.classList.remove("hidden");
        });
        closeBtn.addEventListener("click", function () {
          modal.classList.add("hidden");
        });
        modal.addEventListener("click", function (e) {
          if (e.target === modal) modal.classList.add("hidden");
        });
      })();
    </script>
    <script>
      const musicIcon = document.querySelector(".music-wrap");
      const musicModal = document.getElementById("music-modal");
      const musicClose = document.getElementById("music-close");
      const audio = document.getElementById("bgm-audio");
      const playPauseBtn = document.getElementById("btn-play-pause");
      const trackStatus = document.getElementById("track-status");
      const playerImg = document.querySelector(".player-avatar");
      const progressBar = document.getElementById("progress-bar");

      // Open/Close Modal
      musicIcon.addEventListener("click", () =>
        musicModal.classList.remove("hidden"),
      );
      musicClose.addEventListener("click", () =>
        musicModal.classList.add("hidden"),
      );

      // Play/Pause Logic
      playPauseBtn.addEventListener("click", () => {
        if (audio.paused) {
          audio.play();
          playPauseBtn.textContent = "⏸";
          trackStatus.textContent = "NOW PLAYING";
          playerImg.style.animationPlayState = "running";
        } else {
          audio.pause();
          playPauseBtn.textContent = "▶";
          trackStatus.textContent = "PAUSED";
          playerImg.style.animationPlayState = "paused";
        }
      });

      // Update Progress Bar
      audio.addEventListener("timeupdate", () => {
        const percent = (audio.currentTime / audio.duration) * 100;
        progressBar.style.width = percent + "%";
      });
    </script>
  </body>
</html>
